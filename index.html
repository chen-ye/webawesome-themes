<!DOCTYPE html>
<html lang="en" class="wa-theme-default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Awesome Playground</title>
  <meta name="description" content="Interactive playground for exploring Web Awesome themes, palettes, and components.">

  <style>
    :root {
      --sidebar-width: 300px;
    }

    /* Prevent FOUC */
    :not(:defined) {
      display: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--wa-font-family-body);
      background-color: var(--wa-color-surface-default);
      color: var(--wa-color-text-normal);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    wa-playground,
    wa-color-scales,
    wa-palette-scale {
      display: contents;
    }

    header {
      padding: var(--wa-space-m) var(--wa-space-l);
      border-bottom: var(--wa-border-width-s) solid var(--wa-color-surface-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--wa-color-surface-raised);
    }

    .header-title {
      font-size: var(--wa-font-size-l);
      font-weight: var(--wa-font-weight-bold);
      display: flex;
      align-items: center;
      gap: var(--wa-space-s);
    }

    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      border-right: var(--wa-border-width-s) solid var(--wa-color-surface-border);
      padding: var(--wa-space-l);
      overflow-y: auto;
      background-color: var(--wa-color-surface-lowered);
    }

    .preview-area {
      flex: 1;
      padding: var(--wa-space-xl);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--wa-space-3xl);
    }

    .section-title {
      font-size: var(--wa-font-size-s);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--wa-color-text-quiet);
      margin-bottom: var(--wa-space-l);
      border-bottom: var(--wa-border-width-s) solid var(--wa-color-surface-border);
      padding-bottom: var(--wa-space-3xs);
    }

    .config-view {
      margin-top: auto;
      padding: var(--wa-space-l);
      background-color: var(--wa-color-neutral-95);
      border-top: var(--wa-border-width-s) solid var(--wa-color-surface-border);
      font-family: var(--wa-font-family-code);
      font-size: var(--wa-font-size-2xs);
      white-space: pre-wrap;
    }

    .wa-dark .config-view {
      background-color: var(--wa-color-neutral-05);
    }

    .control-group {
      margin-bottom: var(--wa-space-xl);
    }

    .control-label {
      display: block;
      font-size: var(--wa-font-size-s);
      font-weight: var(--wa-font-weight-semibold);
      margin-bottom: var(--wa-space-s);
    }

    .theme-panel-section {
      margin-bottom: var(--wa-space-3xl);
    }

    .theme-panel-title {
      font-size: var(--wa-font-size-m);
      font-weight: var(--wa-font-weight-bold);
      margin-bottom: var(--wa-space-m);
    }

    .color-picker {
      display: flex;
      gap: var(--wa-space-xs);
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: var(--wa-border-radius-pill);
      border: none;
      cursor: pointer;
      padding: 0;
      background-color: var(--swatch-color);
      outline-offset: 2px;
      outline: 2px solid transparent;
      transition: outline-color 0.2s;
    }

    .color-swatch:hover {
      outline-color: var(--wa-color-neutral-border-normal);
    }

    .color-swatch.selected {
      outline-color: var(--wa-color-text-normal);
    }

    .ui-component-examples {
      columns: 6 300px;
      column-gap: var(--wa-space-l);
    }

    .ui-component-examples > * {
      break-inside: avoid;
      margin-bottom: var(--wa-space-m);
    }
  </style>

  <!-- Root application component -->
  <script type="module" src="./components/wa-playground.js"></script>
</head>
<body>

  <wa-playground></wa-playground>

  <!-- Overlay components at root to avoid CSS containing block issues -->
  <wa-dialog label="Dialog Heading" class="playground-dialog">
    <p>This is a standard dialog component. It appears above the page and dims the background.</p>
    <wa-button slot="footer" variant="brand" onclick="document.querySelector('.playground-dialog').hide()">Close</wa-button>
  </wa-dialog>

  <wa-drawer label="Drawer Heading" placement="end" class="playground-drawer">
    <p>This drawer slides in from the right edge of the screen.</p>
    <wa-button slot="footer" variant="neutral" onclick="document.querySelector('.playground-drawer').hide()">Close</wa-button>
  </wa-drawer>

</body>
</html>
